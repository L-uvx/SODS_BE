version: "4.2"

services:
  api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: sods-api
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sods_be
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:16-3.4
    container_name: sods-postgres
    environment:
      POSTGRES_DB: sods_be
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sods-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
