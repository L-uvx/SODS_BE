services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sods-api
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sods_be
      REDIS_URL: redis://redis:6379/0
      IMPORT_STORAGE_DIR: /app/var/imports
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sods-worker
    working_dir: /app
    command: /opt/venv/bin/celery -A app.core.celery_app:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sods_be
      REDIS_URL: redis://redis:6379/0
      IMPORT_STORAGE_DIR: /app/var/imports
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:16-3.4
    container_name: sods-postgres
    environment:
      POSTGRES_DB: sods_be
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sods-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
